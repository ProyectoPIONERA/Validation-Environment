source_documents:
  - PIONERA E4.1 - final.docx
  - Official PT5 cases normalized for AI Model Hub
  - Local functional analysis of the AIModelHub repository
  - E5.2 pre-integration strategy for Validation-Environment

support_checks:
  - id: MH-BOOTSTRAP-01
    component: ai_model_hub
    case_group: support
    description: Dashboard shell availability
    type: api
    validation_type: support
    dataspace_dimension: support
    execution_mode: api_support
    coverage_status: automated
    mapping_status: supporting
    preconditions:
      - AI Model Hub base URL is known
      - The dashboard is deployed and reachable
    steps:
      - Open the dashboard base URL
      - Confirm that the application shell is returned
    expected_result: The dashboard shell is served successfully
    automation:
      status: automated
      mode: api_support
      runner_case: mh_bootstrap_01_shell
      real_flow:
        method: GET
        path: /
      notes: Bootstrap support check used before PT5 UI automation is enabled.

  - id: MH-BOOTSTRAP-02
    component: ai_model_hub
    case_group: support
    description: Runtime application configuration availability
    type: api
    validation_type: support
    dataspace_dimension: support
    execution_mode: api_support
    coverage_status: automated
    mapping_status: supporting
    preconditions:
      - AI Model Hub base URL is known
      - The dashboard serves runtime configuration files
    steps:
      - Request the runtime application configuration
      - Confirm that the payload exposes dashboard metadata
    expected_result: Runtime configuration is available and usable
    automation:
      status: automated
      mode: api_support
      runner_case: mh_bootstrap_02_runtime_config
      real_flow:
        method: GET
        path: /config/app-config.json
      notes: Bootstrap support check used to confirm that runtime configuration is wired before UI flows are automated.

test_cases:
  - id: PT5-MH-01
    component: ai_model_hub
    case_group: pt5
    description: Access to the model catalog
    type: ui
    validation_type: functional
    dataspace_dimension: access
    execution_mode: ui
    coverage_status: partial
    mapping_status: partial
    preconditions:
      - AI Model Hub is deployed and reachable
      - At least one valid connector or catalog context configuration exists
    steps:
      - Access the catalog from the component UI
      - Confirm that the main catalog view becomes operational
    expected_result: The catalog loads correctly
    traceability:
      - MH-01
    notes: Priority candidate for the first UI automation wave in the framework.
    automation:
      status: automated
      mode: ui_partial
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_01_catalog_access.spec.js
      notes: The current Playwright slice verifies that the catalog route and its primary request surface render correctly.

  - id: PT5-MH-02
    component: ai_model_hub
    case_group: pt5
    description: Model publication
    type: ui
    validation_type: functional
    dataspace_dimension: publication
    execution_mode: ui
    coverage_status: manual
    mapping_status: partial
    preconditions:
      - A provider user with adequate permissions is available
      - The model creation form is accessible
    steps:
      - Register a model with valid metadata
      - Save the model in local state
    expected_result: The model is created in local state
    traceability:
      - MH-04
      - MH-05
      - MH-06
      - MH-07
      - MH-08
      - MH-09
      - MH-10
      - MH-11
      - MH-12
      - MH-13
    notes: The AIModelHub repository already provides a clear UI baseline for this flow, but it is not yet integrated into Validation-Environment.

  - id: PT5-MH-03
    component: ai_model_hub
    case_group: pt5
    description: Model publication
    type: ui
    validation_type: integration
    dataspace_dimension: publication
    execution_mode: api_ui
    coverage_status: manual
    mapping_status: partial
    preconditions:
      - A local model has already been registered
      - The connector federated catalog is available
    steps:
      - Publish the model into the federated catalog
      - Check the external visibility of the model
    expected_result: The model is externally visible
    traceability:
      - MH-14
      - MH-15
    notes: Key case to validate the alignment between the component UI and the connector APIs.

  - id: PT5-MH-04
    component: ai_model_hub
    case_group: pt5
    description: Model discovery
    type: ui
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: ui
    coverage_status: partial
    mapping_status: partial
    preconditions:
      - Published or visible models exist in the catalog
    steps:
      - Open the model catalog
      - Check that the model list is displayed correctly
    expected_result: Models are listed correctly
    traceability:
      - MH-16
    notes: Priority candidate for the first framework UI suite.
    automation:
      status: automated
      mode: ui_partial
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_04_model_listing.spec.js
      notes: The current Playwright slice verifies that the ML assets discovery view renders without entering an application error state.

  - id: PT5-MH-05
    component: ai_model_hub
    case_group: pt5
    description: Model discovery
    type: ui
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: ui
    coverage_status: partial
    mapping_status: partial
    preconditions:
      - Models are indexed in the catalog
      - The global search bar is visible
    steps:
      - Search models using free text
      - Review the returned result set
    expected_result: Search results are coherent with the query
    traceability:
      - MH-17
    notes: Priority candidate for UI automation because the flow is well defined in the E4.1 user manual.
    automation:
      status: automated
      mode: ui_partial
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_05_search.spec.js
      notes: The current Playwright slice verifies that the discovery search input is available and accepts free text queries.

  - id: PT5-MH-06
    component: ai_model_hub
    case_group: pt5
    description: Model discovery
    type: ui
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: ui
    coverage_status: partial
    mapping_status: partial
    preconditions:
      - The catalog shows a filter panel
      - Sufficient metadata exists to discriminate results
    steps:
      - Filter models by metadata
      - Review the resulting set
    expected_result: Filters are applied correctly
    traceability:
      - MH-18
      - MH-19
      - MH-20
      - MH-21
      - MH-22
      - MH-23
      - MH-24
    notes: Priority candidate for UI automation; it should rely on controlled demo data and stable filters.
    automation:
      status: automated
      mode: ui_partial
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_06_filters.spec.js
      notes: The current Playwright slice verifies that the filter shell is present and can interact with dynamic filters when they are available.

  - id: PT5-MH-07
    component: ai_model_hub
    case_group: pt5
    description: Model discovery
    type: ui
    validation_type: functional
    dataspace_dimension: visualization
    execution_mode: ui
    coverage_status: manual
    mapping_status: partial
    preconditions:
      - At least one model is visible in the catalog
    steps:
      - Open the detailed model page
      - Review functional and technical metadata
    expected_result: Complete metadata is visible
    traceability:
      - MH-25
      - MH-26
    notes: Priority case to complete the first discovery coverage slice.

  - id: PT5-MH-08
    component: ai_model_hub
    case_group: pt5
    description: Contracting and execution
    type: ui
    validation_type: integration
    dataspace_dimension: contracts
    execution_mode: api_ui
    coverage_status: manual
    mapping_status: partial
    preconditions:
      - A model with an available contract offer exists
      - The connector contract cycle is operational
    steps:
      - Start the contract negotiation
      - Confirm the creation of the contract or related agreement
    expected_result: The contract is registered
    traceability:
      - MH-28
      - MH-29
      - MH-30
      - MH-31
      - MH-32
    notes: Last recommended case in the first wave. It already requires a minimal integration with EDC APIs in the environment.

  - id: PT5-MH-09
    component: ai_model_hub
    case_group: pt5
    description: Contracting and execution
    type: api
    validation_type: integration
    dataspace_dimension: execution
    execution_mode: api_ui
    coverage_status: not_currently_executable
    mapping_status: partial
    preconditions:
      - A valid agreement exists for the remote model
      - The transfer mechanism is configured
    steps:
      - Request download or access to the model
      - Validate the authorized transfer
    expected_result: Authorized transfer
    traceability:
      - MH-33

  - id: PT5-MH-10
    component: ai_model_hub
    case_group: pt5
    description: Contracting and execution
    type: api
    validation_type: integration
    dataspace_dimension: execution
    execution_mode: api_ui
    coverage_status: not_currently_executable
    mapping_status: partial
    preconditions:
      - An executable model with an accessible endpoint exists
      - The corresponding contractual agreement is active
    steps:
      - Execute inference through the endpoint
      - Validate the model response
    expected_result: Response conforms to the model contract
    traceability:
      - MH-34
      - MH-35

  - id: PT5-MH-11
    component: ai_model_hub
    case_group: pt5
    description: Contracting and execution
    type: ui
    validation_type: integration
    dataspace_dimension: execution
    execution_mode: ui
    coverage_status: not_currently_executable
    mapping_status: partial
    preconditions:
      - Active agreements exist for consumable models
    steps:
      - List current agreements
      - Select an active agreement to operate on the model
    expected_result: Only active agreements are available
    traceability:
      - MH-36

  - id: PT5-MH-12
    component: ai_model_hub
    case_group: pt5
    description: Model comparison
    type: ui
    validation_type: functional
    dataspace_dimension: comparison
    execution_mode: ui
    coverage_status: not_currently_executable
    mapping_status: partial
    preconditions:
      - Multiple comparable models exist
      - The comparison module is accessible
    steps:
      - Select multiple models
      - Confirm that they are prepared for comparison
    expected_result: Models are selected correctly
    traceability:
      - MH-37

  - id: PT5-MH-13
    component: ai_model_hub
    case_group: pt5
    description: Model comparison
    type: api
    validation_type: functional
    dataspace_dimension: comparison
    execution_mode: api_ui
    coverage_status: not_currently_executable
    mapping_status: partial
    preconditions:
      - Multiple comparable and executable models exist
      - The same input can be sent to all of them
    steps:
      - Execute multiple models with the same input
      - Collect comparison responses
    expected_result: Executions are comparable
    traceability:
      - MH-38

  - id: PT5-MH-14
    component: ai_model_hub
    case_group: pt5
    description: Model comparison
    type: api
    validation_type: functional
    dataspace_dimension: comparison
    execution_mode: api_ui
    coverage_status: not_currently_executable
    mapping_status: partial
    preconditions:
      - The comparison module produces aggregated metrics
    steps:
      - Collect and calculate comparison metrics
      - Review the coherence of the resulting values
    expected_result: Metrics are coherent with the task
    traceability:
      - MH-39

  - id: PT5-MH-15
    component: ai_model_hub
    case_group: pt5
    description: Model comparison
    type: ui
    validation_type: functional
    dataspace_dimension: comparison
    execution_mode: ui
    coverage_status: not_currently_executable
    mapping_status: partial
    preconditions:
      - Comparison metrics have already been calculated
    steps:
      - Display comparison tables and charts
      - Review the resulting visualization
    expected_result: Comparative results are visible
    traceability:
      - MH-40
      - MH-41
      - MH-42

  - id: PT5-MH-16
    component: ai_model_hub
    case_group: pt5
    description: Security and identity
    type: api
    validation_type: integration
    dataspace_dimension: identity
    execution_mode: api
    coverage_status: not_currently_executable
    mapping_status: partial
    preconditions:
      - A working OIDC/OAuth2 integration exists in the final environment
    steps:
      - Access the API with OIDC
      - Validate access control and authorization
    expected_result: Access is authenticated correctly
    traceability:
      - MH-45
    notes: This case should not be automated in the framework until the identity contract of the final deployment is fixed.

  - id: PT5-MH-17
    component: ai_model_hub
    case_group: pt5
    description: Traceability and auditing
    type: api
    validation_type: non_functional
    dataspace_dimension: governance
    execution_mode: checklist
    coverage_status: not_currently_executable
    mapping_status: partial
    preconditions:
      - The system exposes verifiable operational traceability
    steps:
      - Execute relevant operations on the component
      - Review the traceability record or evidence
    expected_result: Operations are recorded
    traceability:
      - MH-46

  - id: PT5-MH-18
    component: ai_model_hub
    case_group: pt5
    description: Dataspace integration
    type: api
    validation_type: integration
    dataspace_dimension: integration
    execution_mode: api_ui
    coverage_status: not_currently_executable
    mapping_status: partial
    preconditions:
      - The component is integrated with EDC APIs and the PT5 environment connectors
    steps:
      - Consume connector APIs from the component
      - Validate the end-to-end behavior
    expected_result: Functional integration
    traceability:
      - MH-47
