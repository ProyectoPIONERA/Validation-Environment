apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: {{ .Values.connector.name }}
    validation-environment-adapter: edc
  name: {{ .Values.connector.name }}
spec:
  replicas: {{ .Values.connector.replicas }}
  selector:
    matchLabels:
      service: {{ .Values.connector.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        service: {{ .Values.connector.name }}
        validation-environment-adapter: edc
    spec:
      {{- with .Values.hostAliases }}
      hostAliases:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.connector.name }}
          image: {{ .Values.connector.image.name }}:{{ .Values.connector.image.tag }}
          imagePullPolicy: {{ .Values.connector.image.pullPolicy }}
          env:
            - name: EDC_FS_CONFIG
              value: {{ .Values.connector.configuration.configFilePath | quote }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.connector.jvmArgs | quote }}
          ports:
            - containerPort: 19191
              protocol: TCP
            - containerPort: 19192
              protocol: TCP
            - containerPort: 19193
              protocol: TCP
            - containerPort: 19194
              protocol: TCP
            - containerPort: 19195
              protocol: TCP
            - containerPort: 19196
              protocol: TCP
            - containerPort: 19291
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 19193
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 19193
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /opt/connector/config
              readOnly: true
{{- if eq .Values.connector.environment "pro" }}
            - name: tls-cacerts
              mountPath: /opt/connector/tls-cacerts
{{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Values.connector.name }}-config
{{- if eq .Values.connector.environment "pro" }}
        - name: tls-cacerts
          secret:
            secretName: common-tls-cacerts
{{- end }}
      restartPolicy: Always
